esphome:
  name: test-homed
  friendly_name: Test HOMEd Custom Device

esp32:
  board: esp32dev
  framework:
    type: arduino
logger:
  # level: verbose
# api:
ota:
  - platform: esphome
    password: !secret ota_password
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true
mdns:
  disabled: true

mqtt:
  # id: mqtt_client_id
  broker: !secret mqtt_host
  username: !secret mqtt_user
  password: !secret mqtt_pass
  log_topic: null
  discover_ip: false
  # discovery: false
  homed_custom:
    # topic_prefix: homed319
    # device_id: test-homed
    # discovery: true
    # cloud: true

binary_sensor:
  - platform: status
    name: Status
    entity_category: diagnostic
  - platform: gpio
    name: Boot button
    pin:
      number: 0
      inverted: true
      ignore_strapping_warning: true
      mode:
        input: true
        pullup: true

sensor:
  - platform: internal_temperature
    name: Internal temperature
    entity_category: diagnostic

text_sensor:
  - platform: uptime
    name: Uptime
    entity_category: diagnostic
    format:
      separator: " "
      days: "D"

switch:
  - platform: gpio
    name: Internal LED
    pin:
      number: 2
      ignore_strapping_warning: true

button:
  - platform: restart
    name: Restart
    entity_category: diagnostic
  # - platform: template
  #   name: Publish
  #   entity_category: diagnostic
  #   on_press:
  #     - logger.log: Button Pressed
  #     - lambda: |-
  #         id(mqtt_client_id).publish_homed_custom();

number:
  - platform: template
    name: Test number
    optimistic: true
    min_value: 10
    max_value: 20
    step: 0.5
    unit_of_measurement: "%"

external_components:
  - source: github://dvb6666/esphome-homed
    refresh: 1sec
